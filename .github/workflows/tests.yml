# Tests automatiques à chaque push — zéro dépendance externe (stdlib only).
# Si ce workflow est rouge, NE PAS déployer.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compilation de tout le paquet
        run: python -m compileall -q triskell_core
      - name: Tests unitaires (unittest)
        run: python -m unittest discover tests -v
      - name: Tests du filtre email (runner dédié)
        run: python tests/test_email_filter.py
